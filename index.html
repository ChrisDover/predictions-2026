<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Predictions Tracker — Chris Dover</title>
    <meta name="description" content="Live tracking dashboard for 10 Things Coming in 2026 That Nobody Is Pricing In by Chris Dover.">

    <!-- Atkinson Hyperlegible — designed for legibility -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════════════════
           DESIGN TOKENS — Semantic Color System
           Deuteranopia-safe. WCAG 2.2 AAA text.
           ═══════════════════════════════════════ */
        :root {
            /* Surface */
            --surface-ground:    #121212;
            --surface-primary:   #1A1E24;
            --surface-secondary: #22272E;
            --surface-elevated:  #2A3038;
            --surface-overlay:   rgba(0,0,0,0.72);

            /* Text — AAA on --surface-primary */
            --text-high:    #E0E0E0;   /* 13.2:1 on #1A1E24 */
            --text-medium:  #A8B2BD;   /* 7.5:1  */
            --text-low:     #6E7A88;   /* 4.0:1  — decorative only */

            /* Semantic — CVD-safe palette */
            --status-confirmed:     #2EC4B6;  /* Teal  */
            --status-confirmed-bg:  rgba(46,196,182,0.12);
            --status-tracking:      #4C9AFF;  /* Blue  */
            --status-tracking-bg:   rgba(76,154,255,0.12);
            --status-early:         #E8A838;  /* Amber */
            --status-early-bg:      rgba(232,168,56,0.12);
            --status-failed:        #C0395E;  /* Magenta-Maroon */
            --status-failed-bg:     rgba(192,57,94,0.12);
            --status-pending:       #6E7A88;
            --status-pending-bg:    rgba(110,122,136,0.10);

            /* Action */
            --action-primary:    #4C9AFF;
            --action-primary-hover: #70B0FF;
            --action-focus-ring: #4C9AFF;

            /* Borders */
            --border-subtle:  #2F363E;
            --border-default: #3A424C;

            /* Misc */
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --shadow-card: 0 1px 3px rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --surface-ground:    #F4F5F7;
            --surface-primary:   #FFFFFF;
            --surface-secondary: #F0F1F3;
            --surface-elevated:  #E8EAED;
            --surface-overlay:   rgba(0,0,0,0.45);

            --text-high:    #1A1A1A;
            --text-medium:  #4A5568;
            --text-low:     #8896A6;

            --border-subtle:  #E2E4E8;
            --border-default: #D0D4DA;
            --shadow-card: 0 1px 4px rgba(0,0,0,0.08);
        }

        /* ═══════════════════════════════════════
           RESET & BASE — 18px body, 1.55 line-height
           ═══════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 100%; /* 16px default, we bump body */
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Atkinson Hyperlegible', system-ui, -apple-system, sans-serif;
            font-size: 1.125rem;     /* 18px desktop */
            line-height: 1.55;
            letter-spacing: 0.01em;
            background: var(--surface-ground);
            color: var(--text-high);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Focus Ring — High visibility ── */
        :focus-visible {
            outline: 3px solid var(--action-focus-ring);
            outline-offset: 2px;
            border-radius: var(--radius-sm);
        }

        /* ── Type Scale ── */
        h1 { font-size: 1.75rem; font-weight: 700; line-height: 1.3; }
        h2 { font-size: 1.375rem; font-weight: 700; line-height: 1.35; }
        h3 { font-size: 1.125rem; font-weight: 700; line-height: 1.4; }
        .caption { font-size: 0.8125rem; line-height: 1.4; }
        .overline {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-medium);
        }

        /* ═══════════════════════════════════════
           LAYOUT — Responsive Grid
           Mobile: 1 col  |  Tablet: 2  |  Desktop: 3-4
           ═══════════════════════════════════════ */
        .container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ═══════════════════════════════════════
           HEADER
           ═══════════════════════════════════════ */
        .site-header {
            background: var(--surface-primary);
            border-bottom: 1px solid var(--border-subtle);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--status-tracking), var(--status-confirmed));
            border-radius: var(--radius-md);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.125rem; color: #fff;
            flex-shrink: 0;
        }

        .header-text h1 { font-size: 1.25rem; }
        .header-text .caption { color: var(--text-medium); }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--status-confirmed);
        }

        .live-dot {
            width: 8px; height: 8px;
            background: var(--status-confirmed);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        /* Theme toggle — 44px touch target */
        .theme-toggle {
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-high);
            cursor: pointer;
            font-size: 1.25rem;
        }

        .theme-toggle:hover { background: var(--border-default); }

        /* ═══════════════════════════════════════
           SCORECARD ROW — "Above the Fold"
           ═══════════════════════════════════════ */
        .scorecard-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            padding: 20px 0;
        }

        .scorecard {
            background: var(--surface-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .scorecard .value {
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .scorecard .label {
            font-size: 0.8125rem;
            color: var(--text-medium);
            margin-top: 2px;
        }

        /* ═══════════════════════════════════════
           SCORE PIPS — Visual summary bar
           ═══════════════════════════════════════ */
        .pips-bar {
            display: flex;
            gap: 6px;
            padding: 14px 16px;
            background: var(--surface-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            margin-bottom: 20px;
        }

        .pip {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: var(--surface-elevated);
            position: relative;
        }

        .pip::after {
            content: attr(data-label);
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.625rem;
            color: var(--text-low);
            white-space: nowrap;
        }

        .pip[data-status="confirmed"] { background: var(--status-confirmed); }
        .pip[data-status="tracking"]  { background: var(--status-tracking); }
        .pip[data-status="early"]     { background: var(--status-early); }
        .pip[data-status="failed"]    { background: var(--status-failed); }
        .pip[data-status="pending"]   { background: var(--status-pending); }

        /* ═══════════════════════════════════════
           FILTER BAR — 44px touch targets
           ═══════════════════════════════════════ */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 8px;
        }

        .filter-btn {
            min-height: 44px;
            padding: 8px 16px;
            background: var(--surface-primary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-medium);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }

        .filter-btn:hover {
            border-color: var(--action-primary);
            color: var(--text-high);
        }

        .filter-btn[aria-pressed="true"] {
            background: rgba(76,154,255,0.15);
            border-color: var(--action-primary);
            color: var(--action-primary);
        }

        /* ═══════════════════════════════════════
           PREDICTION CARDS
           ═══════════════════════════════════════ */
        .pred-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 60px;
        }

        .pred-card {
            background: var(--surface-primary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: border-color 0.15s;
        }

        .pred-card:hover { border-color: var(--border-default); }

        /* Status stripe — left border */
        .pred-card[data-status="confirmed"] { border-left: 4px solid var(--status-confirmed); }
        .pred-card[data-status="tracking"]  { border-left: 4px solid var(--status-tracking); }
        .pred-card[data-status="early"]     { border-left: 4px solid var(--status-early); }
        .pred-card[data-status="failed"]    { border-left: 4px solid var(--status-failed); }
        .pred-card[data-status="pending"]   { border-left: 4px solid var(--status-pending); }

        /* Card Header — clickable row */
        .pred-header {
            display: grid;
            grid-template-columns: 52px 1fr auto;
            gap: 14px;
            align-items: start;
            padding: 20px;
            cursor: pointer;
            min-height: 44px;
        }

        .pred-header:hover { background: var(--surface-secondary); }

        .pred-num {
            width: 52px; height: 52px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius-md);
            font-size: 1.25rem; font-weight: 700;
            background: var(--surface-elevated);
            color: var(--text-medium);
            flex-shrink: 0;
        }

        .pred-card[data-status="confirmed"] .pred-num { background: var(--status-confirmed-bg); color: var(--status-confirmed); }
        .pred-card[data-status="tracking"]  .pred-num { background: var(--status-tracking-bg);  color: var(--status-tracking); }
        .pred-card[data-status="early"]     .pred-num { background: var(--status-early-bg);     color: var(--status-early); }
        .pred-card[data-status="failed"]    .pred-num { background: var(--status-failed-bg);    color: var(--status-failed); }

        .pred-body h3 {
            font-size: 1.0625rem;
            margin-bottom: 4px;
        }

        .pred-subtitle {
            font-size: 0.9375rem;
            color: var(--text-medium);
            line-height: 1.5;
        }

        /* Tags row */
        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            background: var(--surface-elevated);
            color: var(--text-medium);
        }

        .tag[data-cat="geo"]    { border: 1px solid rgba(46,196,182,0.35); color: var(--status-confirmed); }
        .tag[data-cat="tech"]   { border: 1px solid rgba(76,154,255,0.35); color: var(--status-tracking); }
        .tag[data-cat="market"] { border: 1px solid rgba(232,168,56,0.35); color: var(--status-early); }
        .tag[data-cat="energy"] { border: 1px solid rgba(219,140,40,0.35); color: #DB8C28; }
        .tag[data-cat="health"] { border: 1px solid rgba(46,196,182,0.35); color: var(--status-confirmed); }

        /* Right-side meta */
        .pred-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            min-width: 140px;
        }

        /* Status badge — icon + text, never color alone */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .status-badge[data-s="confirmed"] { background: var(--status-confirmed-bg); color: var(--status-confirmed); }
        .status-badge[data-s="tracking"]  { background: var(--status-tracking-bg);  color: var(--status-tracking); }
        .status-badge[data-s="early"]     { background: var(--status-early-bg);     color: var(--status-early); }
        .status-badge[data-s="failed"]    { background: var(--status-failed-bg);    color: var(--status-failed); }
        .status-badge[data-s="pending"]   { background: var(--status-pending-bg);   color: var(--status-pending); }

        .status-icon { font-size: 0.875rem; line-height: 1; }

        /* Conviction meter */
        .conviction-wrap { width: 120px; }
        .conviction-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-low);
            margin-bottom: 4px;
        }
        .conviction-track {
            height: 6px;
            background: var(--surface-elevated);
            border-radius: 3px;
            overflow: hidden;
        }
        .conviction-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.4s ease;
        }
        .conviction-fill[data-level="high"] { background: var(--status-confirmed); }
        .conviction-fill[data-level="med"]  { background: var(--status-early); }
        .conviction-fill[data-level="low"]  { background: var(--text-low); }

        /* Expand chevron */
        .expand-chevron {
            display: flex;
            align-items: center;
            font-size: 0.875rem;
            color: var(--text-low);
            transition: transform 0.2s;
        }

        .pred-card[aria-expanded="true"] .expand-chevron { transform: rotate(180deg); }

        /* ═══════════════════════════════════════
           EXPANDED DETAIL PANEL
           ═══════════════════════════════════════ */
        .pred-detail {
            display: none;
            border-top: 1px solid var(--border-subtle);
            padding: 20px;
        }

        .pred-card[aria-expanded="true"] .pred-detail { display: block; }

        .thesis-quote {
            background: var(--surface-secondary);
            border-left: 4px solid var(--status-tracking);
            padding: 14px 18px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.9375rem;
            color: var(--text-medium);
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 18px;
        }

        /* KPI Row */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        .kpi {
            background: var(--surface-secondary);
            padding: 12px;
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .kpi .val {
            font-size: 1.125rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .kpi .lbl {
            font-size: 0.75rem;
            color: var(--text-low);
            margin-top: 2px;
        }

        .trend-up   { color: var(--status-confirmed); }
        .trend-down { color: var(--status-failed); }
        .trend-flat { color: var(--text-low); }

        /* Timeline bar */
        .timeline-row {
            display: flex;
            gap: 3px;
            margin-bottom: 4px;
        }

        .tl-month {
            flex: 1;
            height: 5px;
            border-radius: 3px;
            background: var(--surface-elevated);
        }

        .tl-month[data-phase="past"]    { background: var(--status-tracking); opacity: 0.45; }
        .tl-month[data-phase="current"] { background: var(--status-tracking); }
        .tl-month[data-phase="future"]  { background: var(--surface-elevated); }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.6875rem;
            color: var(--text-low);
            margin-bottom: 16px;
        }

        /* Evidence list */
        .evidence-section h4 {
            margin-bottom: 10px;
        }

        .evidence-list {
            list-style: none;
            margin-bottom: 14px;
        }

        .ev-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.9375rem;
            align-items: flex-start;
        }

        .ev-item:last-child { border-bottom: none; }

        .ev-date {
            color: var(--text-low);
            font-size: 0.8125rem;
            min-width: 62px;
            flex-shrink: 0;
            padding-top: 1px;
        }

        /* Sentiment dot + icon: never color alone */
        .ev-indicator {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .ev-indicator[data-tone="positive"] { background: var(--status-confirmed-bg); color: var(--status-confirmed); }
        .ev-indicator[data-tone="neutral"]  { background: var(--status-tracking-bg);  color: var(--status-tracking); }
        .ev-indicator[data-tone="negative"] { background: var(--status-failed-bg);    color: var(--status-failed); }

        .ev-text {
            color: var(--text-medium);
            line-height: 1.5;
        }

        /* Action buttons */
        .detail-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn {
            min-height: 44px;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--action-primary);
            color: #fff;
            border: 1px solid var(--action-primary);
        }
        .btn-primary:hover { background: var(--action-primary-hover); }

        .btn-secondary {
            background: var(--surface-elevated);
            color: var(--text-high);
            border: 1px solid var(--border-default);
        }
        .btn-secondary:hover { background: var(--border-default); }

        .btn-ghost {
            background: transparent;
            color: var(--text-medium);
            border: 1px solid var(--border-default);
        }
        .btn-ghost:hover { background: var(--surface-secondary); color: var(--text-high); }

        /* ═══════════════════════════════════════
           MODAL — Accessible dialog
           ═══════════════════════════════════════ */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--surface-overlay);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-backdrop.open { display: flex; }

        .modal-dialog {
            background: var(--surface-primary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            width: 520px;
            max-width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal-dialog h2 { margin-bottom: 16px; }

        .field-group {
            margin-bottom: 14px;
        }

        .field-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 700;
            color: var(--text-medium);
            margin-bottom: 6px;
        }

        .field-group textarea,
        .field-group select,
        .field-group input[type="date"] {
            width: 100%;
            min-height: 44px;
            background: var(--surface-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-high);
            font-family: inherit;
            font-size: 1rem;
            padding: 10px 12px;
        }

        .field-group textarea {
            min-height: 88px;
            resize: vertical;
        }

        .field-group select { cursor: pointer; }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* ═══════════════════════════════════════
           RESPONSIVE
           ═══════════════════════════════════════ */
        @media (max-width: 768px) {
            body { font-size: 1rem; }
            h1 { font-size: 1.375rem; }
            .container { padding: 0 14px; }
            .site-header { padding: 12px 0; }

            .header-inner { flex-direction: column; align-items: flex-start; }
            .header-controls { width: 100%; justify-content: space-between; }

            .scorecard-strip { grid-template-columns: repeat(2, 1fr); }
            .scorecard .value { font-size: 1.5rem; }

            .pred-header {
                grid-template-columns: 44px 1fr;
                gap: 10px;
            }
            .pred-meta {
                grid-column: 1 / -1;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                min-width: unset;
            }
            .conviction-wrap { flex: 1; max-width: 160px; }

            .kpi-grid { grid-template-columns: repeat(3, 1fr); }
            .field-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 480px) {
            .scorecard-strip { grid-template-columns: 1fr 1fr; }
            .filter-bar { gap: 6px; }
            .filter-btn { padding: 8px 12px; font-size: 0.8125rem; }
        }

        /* ═══════════════════════════════════════
           GREYSCALE SAFETY — patterns/icons
           ═══════════════════════════════════════ */

/* ═══ State ═══ */
const STORE_KEY = 'predictions_2026_v2';

function loadState() {
    try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return;
        JSON.parse(raw).forEach(s => {
            const p = PREDICTIONS.find(x => x.id === s.id);
            if (p) {
                if (s.status) p.status = s.status;
                if (s.evidence) p.evidence = s.evidence;
                if (s.kpis) p.kpis = s.kpis;
            }
        });
    } catch(e) { /* ignore corrupt state */ }
}

function saveState() {
    localStorage.setItem(STORE_KEY, JSON.stringify(
        PREDICTIONS.map(p => ({ id: p.id, status: p.status, evidence: p.evidence, kpis: p.kpis }))
    ));
}

/* ═══ Helpers ═══ */
const STATUS_MAP = {
    confirmed: { label: 'Confirmed', icon: '&#10003;' },
    tracking:  { label: 'Tracking',  icon: '&#9679;' },
    early:     { label: 'Early Signs', icon: '&#9650;' },
    failed:    { label: 'Failed',    icon: '&#10007;' },
    pending:   { label: 'Pending',   icon: '&#8212;' }
};

const SENTIMENT_ICON = { positive: '&#10003;', neutral: '&#8212;', negative: '&#10007;' };
const TAG_LABELS = { geo: 'Geopolitics', tech: 'Technology', market: 'Markets', energy: 'Energy', health: 'Health' };
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return MONTHS_SHORT[dt.getMonth()] + ' ' + dt.getDate();
}

function convLevel(v) { return v >= 85 ? 'high' : v >= 70 ? 'med' : 'low'; }

function trendHTML(t) {
    if (t === 'up')   return '<span class="trend-up" aria-label="trending up">&#9650;</span>';
    if (t === 'down') return '<span class="trend-down" aria-label="trending down">&#9660;</span>';
    return '<span class="trend-flat" aria-label="stable">&#8212;</span>';
}

/* ═══ Render ═══ */
function renderPips() {
    document.getElementById('pips-bar').innerHTML = PREDICTIONS.map(p =>
        `<div class="pip" data-status="${p.status}" data-label="#${p.id}" aria-label="Prediction ${p.id}: ${STATUS_MAP[p.status].label}"></div>`
    ).join('');
}

function renderScores() {
    const c = { confirmed:0, tracking:0, early:0, pending:0, failed:0 };
    let evTotal = 0;
    PREDICTIONS.forEach(p => { c[p.status]++; evTotal += p.evidence.length; });

    document.getElementById('sc-confirmed').textContent = c.confirmed;
    document.getElementById('sc-tracking').textContent  = c.tracking;
    document.getElementById('sc-early').textContent     = c.early;
    document.getElementById('sc-pending').textContent    = c.pending + c.failed;
    document.getElementById('sc-evidence').textContent   = evTotal;

    const daysLeft = Math.max(0, Math.floor((new Date('2026-12-31') - new Date()) / 864e5));
    document.getElementById('sc-days').textContent = daysLeft;
}

function renderTimeline(evidence) {
    const now = new Date();
    const cm = now.getMonth();
    let html = '<div class="timeline-row">';
    for (let i = 0; i < 12; i++) {
        const phase = i < cm ? 'past' : i === cm ? 'current' : 'future';
        html += `<div class="tl-month" data-phase="${phase}" aria-label="${MONTHS_SHORT[i]}"></div>`;
    }
    html += '</div><div class="timeline-labels"><span>Jan</span><span>Jun</span><span>Dec</span></div>';
    return html;
}

function renderCard(p) {
    const st = STATUS_MAP[p.status];
    const cl = convLevel(p.conviction);

    const evidenceHTML = p.evidence
        .slice().sort((a,b) => new Date(b.date) - new Date(a.date))
        .map(e => `
            <li class="ev-item">
                <span class="ev-date">${fmtDate(e.date)}</span>
                <span class="ev-indicator" data-tone="${e.sentiment}" aria-label="${e.sentiment}">${SENTIMENT_ICON[e.sentiment]}</span>
                <span class="ev-text">${e.text}</span>
            </li>`
        ).join('');

    const kpiHTML = p.kpis.map(k =>
        `<div class="kpi"><div class="val">${k.value} ${trendHTML(k.trend)}</div><div class="lbl">${k.label}</div></div>`
    ).join('');

    const tagsHTML = p.tags.map(t =>
        `<span class="tag" data-cat="${t}">${TAG_LABELS[t] || t}</span>`
    ).join('');

    return `
    <article class="pred-card" data-id="${p.id}" data-status="${p.status}" data-tags="${p.tags.join(',')}" aria-expanded="false" role="listitem">
        <div class="pred-header" onclick="toggleExpand(${p.id})" role="button" tabindex="0" aria-controls="detail-${p.id}" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleExpand(${p.id})}">
            <div class="pred-num" aria-hidden="true">${p.id}</div>
            <div class="pred-body">
                <h3>${p.title}</h3>
                <div class="pred-subtitle">${p.subtitle}</div>
                <div class="tags">${tagsHTML}</div>
            </div>
            <div class="pred-meta">
                <span class="status-badge" data-s="${p.status}">
                    <span class="status-icon" aria-hidden="true">${st.icon}</span>
                    ${st.label}
                </span>
                <div class="conviction-wrap">
                    <div class="conviction-labels"><span>Conviction</span><span>${p.conviction}%</span></div>
                    <div class="conviction-track" role="progressbar" aria-valuenow="${p.conviction}" aria-valuemin="0" aria-valuemax="100" aria-label="Conviction ${p.conviction}%">
                        <div class="conviction-fill" data-level="${cl}" style="width:${p.conviction}%"></div>
                    </div>
                </div>
                <span class="expand-chevron" aria-hidden="true">&#9660;</span>
            </div>
        </div>
        <div class="pred-detail" id="detail-${p.id}">
            <div class="thesis-quote">"${p.thesis}"</div>
            <div class="kpi-grid">${kpiHTML}</div>
            ${renderTimeline(p.evidence)}
            <div class="evidence-section">
                <h4 class="overline">Evidence Timeline (${p.evidence.length})</h4>
                <ul class="evidence-list" role="list">${evidenceHTML}</ul>
            </div>
            <div class="detail-actions">
                <button class="btn btn-primary" onclick="openModal(${p.id})">+ Add Evidence</button>
                <button class="btn btn-ghost" onclick="openModal(${p.id}, true)">Change Status</button>
            </div>
        </div>
    </article>`;
}

function renderAll() {
    document.getElementById('pred-list').innerHTML = PREDICTIONS.map(renderCard).join('');
    renderScores();
    renderPips();
}

/* ═══ Interactions ═══ */
function toggleExpand(id) {
    const card = document.querySelector(`.pred-card[data-id="${id}"]`);
    const isOpen = card.getAttribute('aria-expanded') === 'true';
    card.setAttribute('aria-expanded', String(!isOpen));
}

/* Filters */
document.querySelector('.filter-bar').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.setAttribute('aria-pressed', 'false'));
    btn.setAttribute('aria-pressed', 'true');
    const f = btn.dataset.filter;

    document.querySelectorAll('.pred-card').forEach(card => {
        if (f === 'all') { card.style.display = ''; return; }
        const statusMatch = card.dataset.status === f;
        const tagMatch = card.dataset.tags.includes(f);
        card.style.display = (statusMatch || tagMatch) ? '' : 'none';
    });
});

/* Modal */
let modalPredId = null;
function openModal(id, statusFocus) {
    modalPredId = id;
    document.getElementById('modal-heading').textContent = `Add Evidence — Prediction #${id}`;
    document.getElementById('ev-text').value = statusFocus ? 'Status update' : '';
    document.getElementById('ev-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('ev-sentiment').value = 'positive';
    document.getElementById('ev-status').value = '';
    document.getElementById('modal-backdrop').classList.add('open');

    // Trap focus
    setTimeout(() => {
        const target = statusFocus ? document.getElementById('ev-status') : document.getElementById('ev-text');
        target.focus();
    }, 50);
}

function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    modalPredId = null;
}

function saveEvidence() {
    if (!modalPredId) return;
    const text = document.getElementById('ev-text').value.trim();
    if (!text) { document.getElementById('ev-text').focus(); return; }

    const pred = PREDICTIONS.find(p => p.id === modalPredId);
    pred.evidence.push({
        date: document.getElementById('ev-date').value,
        text,
        sentiment: document.getElementById('ev-sentiment').value
    });

    const ns = document.getElementById('ev-status').value;
    if (ns) pred.status = ns;

    saveState();
    const wasExpanded = modalPredId;
    renderAll();
    closeModal();
    // Re-expand card
    setTimeout(() => {
        const card = document.querySelector(`.pred-card[data-id="${wasExpanded}"]`);
        if (card) card.setAttribute('aria-expanded', 'true');
    }, 30);
}

// Close modal on backdrop click or Escape
document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('modal-backdrop').classList.contains('open')) closeModal();
});

/* Theme toggle */
function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    document.getElementById('theme-icon').innerHTML = next === 'dark' ? '&#9789;' : '&#9788;';
    localStorage.setItem('predictions_theme', next);
}

// Restore theme
(function() {
    const saved = localStorage.getItem('predictions_theme');
    if (saved) {
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-icon').innerHTML = saved === 'dark' ? '&#9789;' : '&#9788;';
    }
})();

/* ═══ Boot ═══ */
loadState();
renderAll();

// Timestamp
setInterval(() => {
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}, 60000);
</script>
</body>
</html>
